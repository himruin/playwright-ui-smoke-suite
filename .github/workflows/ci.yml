name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"  # nightly at 03:00 UTC

# opt into Node.js 24 for all actions (Node.js 20 deprecated, forced June 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# workflow token security
permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium firefox

      - name: Run smoke tests
        # browsers (chromium, firefox) driven by addopts in pytest.ini
        run: pytest tests/ -m smoke --tb=short --junitxml=results-smoke.xml

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-smoke
          path: results-smoke.xml

  extended:
    name: Extended Tests
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    if: github.event_name != 'schedule'  # nightly cron runs smoke only
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium firefox

      - name: Run extended tests
        # browsers (chromium, firefox) driven by addopts in pytest.ini
        run: pytest tests_extended/ -m extended --tb=short --junitxml=results-extended.xml

      - name: Upload extended results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-extended
          path: results-extended.xml
